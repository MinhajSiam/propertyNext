<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - PropertyNext</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #F7F9FA;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --brand-primary: #0A0A0A;
            --border-color: #E5E7EB;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .brand-logo {
            margin-bottom: 30px;
        }

        .brand-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--brand-primary);
        }

        .brand-logo span {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            background: #FAFAFA;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--brand-primary);
            background: #FFF;
            box-shadow: 0 0 0 3px rgba(10, 10, 10, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .error-msg {
            color: #DC2626;
            background: #FEF2F2;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #FCA5A5;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="brand-logo">
            <h1>PropertyNext</h1>
            <span>Executive Portal</span>
        </div>

        <div class="error-msg" id="errorMsg">Invalid credentials.</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@propertynext.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Secure Login</button>
        </form>
    </div>

    <script>
        // যদি আগেই লগইন করা থাকে, তবে ড্যাশবোর্ডে পাঠিয়ে দেবে
        if (localStorage.getItem('token')) {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            btn.innerText = "Authenticating..."; btn.style.opacity = "0.7";
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://propertynext-api.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // লগইন সফল হলে টোকেনটি ব্রাউজারের লোকাল স্টোরেজে সেভ করে রাখা হচ্ছে
                    localStorage.setItem('token', data.token);
                    window.location.href = 'admin-dashboard.html'; // ড্যাশবোর্ডে প্রবেশ
                } else {
                    errorMsg.innerText = data.error;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = "Server error. Is the backend running?";
                errorMsg.style.display = 'block';
            } finally {
                btn.innerText = "Secure Login"; btn.style.opacity = "1";
            }
        });
    </script>
</body>

</html>
